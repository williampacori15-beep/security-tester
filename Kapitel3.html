<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ISTQB Security Tester</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f0f0f0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.exam-container{
    width:1400px;
    height:95vh;
    background:white;
    border:1px solid #ccc;
    display:flex;
    flex-direction:column;
}

.top-bar{
    background:#0c4d80;
    color:white;
    padding:15px;
    display:flex;
    justify-content:space-between;
    font-weight:bold;
}

.question-header{
    background:#eaeaea;
    padding:10px;
    text-align:center;
    border-bottom:1px solid #ccc;
    font-weight:bold;
}

.question-area{
    flex:1;
    padding:40px;
    overflow-y:auto;
}

.question-title{
    font-size:19px;
    line-height:1.8;
    white-space:pre-line;
    margin-bottom:25px;
    font-weight:bold;
}

.option{
    display:block;
    margin-bottom:15px;
    line-height:1.5;
}

.navigation{
    padding:15px;
    border-top:1px solid #ccc;
    display:flex;
    justify-content:space-between;
}

.left-buttons,
.right-buttons{
    display:flex;
    gap:10px;
}

button{
    border:none;
    padding:10px 18px;
    color:white;
    cursor:pointer;
    font-weight:bold;
}

.blue{
    background:#0b5ea8;
}

.orange{
    background:#f1ad43;
}

.dark{
    background:#16344f;
}

.answer-box{
    margin-top:25px;
    padding:15px;
    background:#fff8d6;
    border:1px solid #d8c46b;
    display:none;
    font-weight:bold;
}

#resultScreen{
    display:none;
    padding:40px;
    text-align:center;
}

#finalScore{
    font-size:60px;
    color:#0c4d80;
}

</style>
</head>

<body>

<div class="exam-container">

    <div class="top-bar">
        <div>ISTQB Security Tester</div>
        <div id="counter"></div>
    </div>

    <div class="question-header">
        Mock Exam
    </div>

    <div class="question-area">

        <div id="question" class="question-title"></div>

        <div id="options"></div>

        <div id="answerBox" class="answer-box"></div>

    </div>

    <div id="resultScreen">

        <h1>ISTQB Security Tester</h1>

        <h2>Exam Result</h2>

        <br>

        <div id="finalScore"></div>

        <br>

        <h3 id="correctCount"></h3>

        <h3 id="incorrectCount"></h3>

        <h3 id="answeredCount"></h3>

        <h3 id="unansweredCount"></h3>

        <br>

        <h2 id="examStatus"></h2>

    </div>

    <div class="navigation">

        <div class="left-buttons">

            <button class="blue"
                    onclick="previousQuestion()">
                ◀ Previous
            </button>

            <button class="blue"
                    onclick="nextQuestion()">
                Next ▶
            </button>

        </div>

        <div class="right-buttons">

            <button class="orange"
                    onclick="showAnswer()">
                Show Answer
            </button>

            <button class="dark"
                    onclick="saveSession()">
                Save Session
            </button>

            <button class="dark"
                    onclick="endExam()">
                End Exam
            </button>

        </div>

    </div>

</div>

<script>

/* PEGAR AQUÍ TU ARRAY QUESTIONS */

const questions = [

{
id:371,
question:"Ein Tester muss denselben Sicherheitstest nach einer Wiederherstellung der Umgebung erneut ausführen. Die Ergebnisse sollen mit dem ursprünglichen Test vergleichbar sein.\n\nWelche Eigenschaft der Sicherheitstestumgebung ist hier am wichtigsten?",
options:[
"Isoliert",
"Vollständig",
"Reproduzierbar",
"Genehmigt"
],
correct:2
},

{
id:372,
question:"Ein Projekt verwendet Standardsoftware eines externen Herstellers. Der Sicherheitstester möchte den Quellcode analysieren.\n\nWelche Aussage beschreibt die Situation am besten?",
options:[
"Strukturelle Analysen sind normalerweise nicht möglich",
"Open-Source-Werkzeuge müssen verwendet werden",
"Penetrationstests sind nicht erlaubt",
"Funktionale Tests sind nicht möglich"
],
correct:0
},

{
id:373,
question:"Während eines Projekts ändern sich Sicherheitsanforderungen regelmäßig. Sicherheitstests werden in jeder Iteration durchgeführt.\n\nWelcher Lebenszyklus wird beschrieben?",
options:[
"Sequenzieller Lebenszyklus",
"Iterativer oder inkrementeller Lebenszyklus",
"COTS-Lebenszyklus",
"Abnahme-Lebenszyklus"
],
correct:1
},

{
id:374,
question:"Ein Sicherheitstester erstellt Testdaten, Testskripte und Testszenarien für einen geplanten Sicherheitstest.\n\nIn welcher Prozessphase befindet er sich?",
options:[
"Evaluierung und Abschlussberichterstattung",
"Planung und Steuerung",
"Abschluss der Sicherheitstests",
"Realisierung und Ausführung"
],
correct:3
},

{
id:375,
question:"Ein Team identifiziert Sicherheitsrisiken und leitet daraus konkrete Testbedingungen ab.\n\nWelche Aktivität wird durchgeführt?",
options:[
"Analyse und Entwurf von Sicherheitstests",
"Bewertung von Sicherheitstests",
"Abschluss der Sicherheitstests",
"Wartung von Sicherheitstests"
],
correct:0
},

{
id:376,
question:"Ein Projektleiter prüft, ob ausreichend Zeit für Regressionstests und die Einrichtung der Testumgebung eingeplant wurde.\n\nWelcher Bereich wird betrachtet?",
options:[
"Genehmigungen",
"Aufgaben und Aufwand",
"Review",
"Geltungsbereich"
],
correct:1
},

{
id:377,
question:"Bei einem Test werden extrem lange Eingaben verwendet, um Speicherbereiche zu überschreiben.\n\nWelches strukturelle Sicherheitsrisiko wird untersucht?",
options:[
"SQL-Injection",
"Passwort-Knacken",
"Pufferüberlauf",
"Account Harvesting"
],
correct:2
},

{
id:378,
question:"Ein Prüfer bewertet, ob ein Sicherheitstest direkt auf Sicherheitsanforderungen zurückgeführt werden kann.\n\nWelche Eigenschaft wird betrachtet?",
options:[
"Automatisierbarkeit",
"Zielgruppenorientierung",
"Risikoorientierung",
"Rückführbarkeit"
],
correct:3
},

{
id:379,
question:"Das Management möchte wissen, ob die entworfenen Sicherheitsvorkehrungen tatsächlich implementiert wurden und wie vorgesehen funktionieren.\n\nWelchem Ziel der Sicherheitstestplanung entspricht dies?",
options:[
"Überprüfung der Sicherheitsvorkehrungen",
"Definition des Geltungsbereichs",
"Bewertung der Testbarkeit",
"Erstellung eines Auditberichts"
],
correct:0
},

{
id:380,
question:"Ein Unternehmen entscheidet, welche Teile der Anwendung getestet werden und welche bewusst ausgeschlossen werden.\n\nWelcher Bestandteil der Sicherheitstestvorgehensweise wird festgelegt?",
options:[
"Zeitplanung",
"Geltungsbereich",
"Review",
"Genehmigung"
],
correct:1
},

{
id:381,
question:"Ein Test überprüft, ob eine Anwendung gegen SQL-Injection abgesichert ist.\n\nWelcher Kategorie gehört dieser Test an?",
options:[
"Strukturelles Sicherheitsrisiko",
"Interne Gefährdung",
"Funktionales Sicherheitsrisiko",
"Sicherheitsaudit"
],
correct:2
},

{
id:382,
question:"Ein Unternehmen archiviert Testdaten, Testergebnisse und sensible Informationen nach Abschluss eines Projekts.\n\nWelche Phase wird durchgeführt?",
options:[
"Analyse und Entwurf",
"Planung und Steuerung",
"Evaluierung",
"Abschluss der Sicherheitstests"
],
correct:3
}

];

let currentQuestion = 0;

let userAnswers =
    new Array(questions.length).fill(null);

function saveCurrentAnswer(){

    const selected =
        document.querySelector(
            'input[name="answer"]:checked'
        );

    if(selected){

        userAnswers[currentQuestion] =
            parseInt(selected.value);
    }
}

function loadQuestion(){

    const q = questions[currentQuestion];

    document.getElementById("counter").innerHTML =
        `Question ${currentQuestion+1} of ${questions.length}`;

    document.getElementById("question").innerText =
        q.question;

    let html = "";

    q.options.forEach((option,index)=>{

        const checked =
            userAnswers[currentQuestion] === index
            ? "checked"
            : "";

        html += `
        <label class="option">

            <input
                type="radio"
                name="answer"
                value="${index}"
                ${checked}>

            ${String.fromCharCode(65+index)}.
            ${option}

        </label>`;
    });

    document.getElementById("options").innerHTML =
        html;

    document.getElementById("answerBox").style.display =
        "none";
}

function nextQuestion(){

    saveCurrentAnswer();

    if(currentQuestion < questions.length-1){

        currentQuestion++;

        loadQuestion();
    }
}

function previousQuestion(){

    saveCurrentAnswer();

    if(currentQuestion > 0){

        currentQuestion--;

        loadQuestion();
    }
}

function showAnswer(){

    const q = questions[currentQuestion];

    const letter =
        String.fromCharCode(
            65 + q.correct
        );

    document.getElementById("answerBox")
        .style.display = "block";

    document.getElementById("answerBox")
        .innerHTML =
        "✅ Correct Answer: " + letter;
}

function saveSession(){

    localStorage.setItem(
        "currentQuestion",
        currentQuestion
    );

    localStorage.setItem(
        "userAnswers",
        JSON.stringify(userAnswers)
    );

    alert("Session saved");
}

function endExam(){

    saveCurrentAnswer();

    let correct = 0;

    let answered = 0;

    for(let i=0;i<questions.length;i++){

        if(userAnswers[i] !== null){

            answered++;

            if(
                userAnswers[i] ===
                questions[i].correct
            ){
                correct++;
            }
        }
    }

    const total =
        questions.length;

    const incorrect =
        answered - correct;

    const unanswered =
        total - answered;

    const percentage =
        (
            (correct / total)
            * 100
        ).toFixed(2);

    const passed =
        percentage >= 65;

    document.querySelector(".question-area")
        .style.display = "none";

    document.querySelector(".navigation")
        .style.display = "none";

    document.getElementById("resultScreen")
        .style.display = "block";

    document.getElementById("finalScore")
        .innerHTML =
        percentage + "%";

    document.getElementById("correctCount")
        .innerHTML =
        "✅ Correct: " + correct;

    document.getElementById("incorrectCount")
        .innerHTML =
        "❌ Incorrect: " + incorrect;

    document.getElementById("answeredCount")
        .innerHTML =
        "📝 Answered: " + answered;

    document.getElementById("unansweredCount")
        .innerHTML =
        "⚪ Unanswered: " + unanswered;

    document.getElementById("examStatus")
        .innerHTML =
        passed
        ? "✅ PASSED"
        : "❌ FAILED";
}

if(questions.length > 0){
    loadQuestion();
}

</script>

</body>
</html>
