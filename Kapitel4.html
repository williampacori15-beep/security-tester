<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ISTQB Security Tester</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f0f0f0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.exam-container{
    width:1400px;
    height:95vh;
    background:white;
    border:1px solid #ccc;
    display:flex;
    flex-direction:column;
}

.top-bar{
    background:#0c4d80;
    color:white;
    padding:15px;
    display:flex;
    justify-content:space-between;
    font-weight:bold;
}

.question-header{
    background:#eaeaea;
    padding:10px;
    text-align:center;
    border-bottom:1px solid #ccc;
    font-weight:bold;
}

.question-area{
    flex:1;
    padding:40px;
    overflow-y:auto;
}

.question-title{
    font-size:19px;
    line-height:1.8;
    white-space:pre-line;
    margin-bottom:25px;
    font-weight:bold;
}

.option{
    display:block;
    margin-bottom:15px;
    line-height:1.5;
}

.navigation{
    padding:15px;
    border-top:1px solid #ccc;
    display:flex;
    justify-content:space-between;
}

.left-buttons,
.right-buttons{
    display:flex;
    gap:10px;
}

button{
    border:none;
    padding:10px 18px;
    color:white;
    cursor:pointer;
    font-weight:bold;
}

.blue{
    background:#0b5ea8;
}

.orange{
    background:#f1ad43;
}

.dark{
    background:#16344f;
}

.answer-box{
    margin-top:25px;
    padding:15px;
    background:#fff8d6;
    border:1px solid #d8c46b;
    display:none;
    font-weight:bold;
}

#resultScreen{
    display:none;
    padding:40px;
    text-align:center;
}

#finalScore{
    font-size:60px;
    color:#0c4d80;
}

</style>
</head>

<body>

<div class="exam-container">

    <div class="top-bar">
        <div>ISTQB Security Tester</div>
        <div id="counter"></div>
    </div>

    <div class="question-header">
        Mock Exam
    </div>

    <div class="question-area">

        <div id="question" class="question-title"></div>

        <div id="options"></div>

        <div id="answerBox" class="answer-box"></div>

    </div>

    <div id="resultScreen">

        <h1>ISTQB Security Tester</h1>

        <h2>Exam Result</h2>

        <br>

        <div id="finalScore"></div>

        <br>

        <h3 id="correctCount"></h3>

        <h3 id="incorrectCount"></h3>

        <h3 id="answeredCount"></h3>

        <h3 id="unansweredCount"></h3>

        <br>

        <h2 id="examStatus"></h2>

    </div>

    <div class="navigation">

        <div class="left-buttons">

            <button class="blue"
                    onclick="previousQuestion()">
                ◀ Previous
            </button>

            <button class="blue"
                    onclick="nextQuestion()">
                Next ▶
            </button>

        </div>

        <div class="right-buttons">

            <button class="orange"
                    onclick="showAnswer()">
                Show Answer
            </button>

            <button class="dark"
                    onclick="saveSession()">
                Save Session
            </button>

            <button class="dark"
                    onclick="endExam()">
                End Exam
            </button>

        </div>

    </div>

</div>

<script>

/* PEGAR AQUÍ TU ARRAY QUESTIONS */

const questions = [
{
id:501,
question:`Ein Unternehmen entwickelt eine Anwendung für die Verarbeitung sensibler Finanzdaten.

Während der Analysephase stellt der Sicherheitstester fest, dass keine Anforderungen für Passwortkomplexität, Kontosperrung oder Sitzungsverwaltung definiert wurden.

Die Projektleitung möchte mit der Implementierung beginnen, um Termine einzuhalten.

Welche Maßnahme sollte zuerst empfohlen werden?`,
options:[
"Mit der Implementierung beginnen und Sicherheitsprobleme später beheben",
"Die fehlenden Sicherheitsanforderungen identifizieren und ergänzen",
"Direkt einen Penetrationstest durchführen",
"Die Datenbank verschlüsseln"
],
correct:1
},

{
id:502,
question:`Bei einem Architektur-Review wird festgestellt, dass alle Komponenten einer Anwendung uneingeschränkten Zugriff auf sämtliche Kundendaten besitzen.

Das Entwicklungsteam argumentiert, dass dies die Implementierung vereinfacht.

Welche Maßnahme reduziert das Risiko am wirkungsvollsten?`,
options:[
"Einführung geeigneter Zugriffskontrollen und Berechtigungsmodelle",
"Durchführung zusätzlicher Lasttests",
"Erhöhung der Anzahl von Testfällen",
"Verbesserung der Systemdokumentation"
],
correct:0
},

{
id:503,
question:`Eine Anwendung verarbeitet vertrauliche Kundendaten.

Bei der Analyse der Datenflüsse erkennt der Sicherheitstester, dass Benutzereingaben ungeprüft direkt in Datenbankabfragen verwendet werden.

Welche Gefährdung sollte als besonders kritisch betrachtet werden?`,
options:[
"Verlust von Backups",
"Unzureichende Rollenverwaltung",
"SQL-Injection",
"Veraltete Betriebssysteme"
],
correct:2
},

{
id:504,
question:`Ein Team führt erfolgreiche funktionale Sicherheitstests durch.

Kurz vor dem Produktivbetrieb werden mehrere Bibliotheken und Frameworks aktualisiert.

Welche Aktivität sollte als Nächstes priorisiert werden?`,
options:[
"Erstellung eines neuen Projektplans",
"Durchführung von Abnahmetests",
"Aktualisierung der Sicherheitsrichtlinie",
"Durchführung sicherheitsrelevanter Regressionstests"
],
correct:3
},

{
id:505,
question:`Während eines Penetrationstests kann sich ein Benutzer anmelden und anschließend auf Datensätze anderer Benutzer zugreifen.

Authentifizierung funktioniert ordnungsgemäß.

Welcher Sicherheitsbereich weist wahrscheinlich die größte Schwäche auf?`,
options:[
"Autorisierung",
"Verschlüsselung",
"Verfügbarkeit",
"Datensicherung"
],
correct:0
},

{
id:506,
question:`Ein Unternehmen verfügt über begrenzte Ressourcen für Sicherheitstests.

Die Anwendung verarbeitet Kreditkartendaten, Gesundheitsdaten und öffentliche Marketinginformationen.

Welche Vorgehensweise entspricht am ehesten einem risikobasierten Ansatz?`,
options:[
"Alle Funktionen gleich intensiv testen",
"Zuerst die Bereiche mit dem höchsten Geschäftsrisiko testen",
"Nur öffentliche Informationen testen",
"Nur automatisierte Tests durchführen"
],
correct:1
},

{
id:507,
question:`Während eines Code-Reviews werden mehrere Stellen gefunden, an denen Fehlermeldungen sensible technische Details enthalten.

Die Anwendung wird über das Internet erreichbar sein.

Welches Risiko entsteht dadurch hauptsächlich?`,
options:[
"Höherer Speicherverbrauch",
"Unterstützung von Angriffen durch Informationsgewinnung",
"Verlust der Datenintegrität",
"Verlangsamung von Regressionstests"
],
correct:1
},

{
id:508,
question:`Ein Unternehmen verwendet eine Open-Source-Komponente.

Eine neue kritische Schwachstelle wird öffentlich bekannt gemacht.

Die Komponente wird in mehreren produktiven Systemen eingesetzt.

Welche Maßnahme sollte zuerst erfolgen?`,
options:[
"Bewertung der Betroffenheit und der damit verbundenen Risiken",
"Durchführung von Lasttests",
"Erstellung neuer Benutzerkonten",
"Überarbeitung der Datenklassifizierung"
],
correct:0
},

{
id:509,
question:`Eine Anwendung soll nach drei fehlgeschlagenen Anmeldeversuchen ein Benutzerkonto sperren.

Der Tester möchte diese Sicherheitsanforderung validieren.

Welche Testart ist am geeignetsten?`,
options:[
"Walkthrough",
"Funktionaler Sicherheitstest",
"Architekturreview",
"Audit"
],
correct:1
},

{
id:510,
question:`Ein Projekt befindet sich in einer frühen Entwurfsphase.

Ein Gefährdungsmodell wurde bereits erstellt.

Wie sollte dieses Modell genutzt werden?`,
options:[
"Zur Ableitung und Priorisierung von Sicherheitstests",
"Zur Erstellung der Benutzerdokumentation",
"Zur Definition der Projektorganisation",
"Zur Ablösung von Sicherheitsanforderungen"
],
correct:0
},

{
id:511,
question:`Ein Sicherheitstester entdeckt während der Wartung eine Änderung am Authentifizierungsmechanismus.

Die Änderung betrifft mehrere Schnittstellen.

Welche Aktivität ist am wichtigsten?`,
options:[
"Regressionstests der sicherheitskritischen Bereiche",
"Erstellung eines Auditberichts",
"Definition neuer Geschäftsziele",
"Reduzierung des Testumfangs"
],
correct:0
},

{
id:512,
question:`Ein Unternehmen möchte Sicherheitsprobleme möglichst früh erkennen.

Welche Aktivität liefert typischerweise den höchsten Nutzen bei den geringsten Änderungskosten?`,
options:[
"Analyse von Sicherheitsanforderungen",
"Penetrationstest im Produktivsystem",
"Auswertung von Sicherheitsvorfällen",
"Regressionstest nach der Freigabe"
],
correct:0
},

{
id:513,
question:`Ein Sicherheitstester erhält die Aufgabe, eine neue Testumgebung vorzubereiten.

Die Testergebnisse sollen reproduzierbar sein.

Welcher Aspekt ist dabei besonders wichtig?`,
options:[
"Verwendung derselben Datenklassifizierung",
"Reproduzierbarkeit der Testumgebung",
"Größe des Projektteams",
"Nutzung aktueller Präsentationsvorlagen"
],
correct:1
},

{
id:514,
question:`Während eines Architekturreviews wird festgestellt, dass sensible Daten zwischen Systemkomponenten unverschlüsselt übertragen werden.

Die Implementierung hat noch nicht begonnen.

Welche Entscheidung ist am sinnvollsten?`,
options:[
"Änderung der Architektur vor der Implementierung",
"Verzicht auf Sicherheitstests",
"Durchführung eines Abnahmetests",
"Einsatz zusätzlicher Lasttests"
],
correct:0
},

{
id:515,
question:`Ein Unternehmen hat bereits zahlreiche Sicherheitstests durchgeführt.

Allerdings wurden Ergebnisse weder dokumentiert noch ausgewertet.

Die Unternehmensleitung fragt nach dem Nutzen weiterer Tests.

Was sollte zuerst erfolgen?`,
options:[
"Mehr Penetrationstests durchführen",
"Neue Sicherheitswerkzeuge kaufen",
"Ergebnisse analysieren und den Nutzen anhand eines Business Case darstellen",
"Die Anzahl der Tester verdoppeln"
],
correct:2
},

{
id:516,
question:`Während eines Tests wird festgestellt, dass lange Eingaben Speicherbereiche überschreiben können.

Der Fehler wurde während einer strukturellen Analyse gefunden.

Welche Art von Schwachstelle liegt am ehesten vor?`,
options:[
"Cross-Site-Scripting",
"Pufferüberlauf",
"Schwache Passwort-Richtlinie",
"Fehlende Datensicherung"
],
correct:1
},

{
id:517,
question:`Ein Unternehmen möchte nachweisen, dass nur berechtigte Benutzer auf vertrauliche Daten zugreifen können.

Welcher Sicherheitsbereich sollte vorrangig getestet werden?`,
options:[
"Autorisierung",
"Verfügbarkeit",
"Datensicherung",
"Archivierung"
],
correct:0
},

{
id:518,
question:`Ein Sicherheitstester erkennt, dass mehrere Sicherheitsanforderungen einander widersprechen.

Die Entwicklung hat noch nicht begonnen.

Welches Vorgehen ist am sinnvollsten?`,
options:[
"Widersprüche analysieren und Anforderungen bereinigen",
"Implementierung starten und später korrigieren",
"Penetrationstests durchführen",
"Architekturreviews überspringen"
],
correct:0
},

{
id:519,
question:`Eine Anwendung wurde erfolgreich getestet.

Nach der Freigabe wird eine kritische Schwachstelle in einem verwendeten Framework veröffentlicht.

Welche Aktivität gehört nun zum Bereich Wartung von Sicherheitstests?`,
options:[
"Bewertung neuer Risiken und Anpassung der Tests",
"Neudefinition aller Geschäftsziele",
"Verzicht auf weitere Tests",
"Archivierung aller Testfälle"
],
correct:0
},

{
id:520,
question:`Ein Unternehmen verarbeitet medizinische Daten.

Die Geschäftsführung erkennt die Bedeutung von Sicherheit, stellt jedoch weder Budget noch Ressourcen bereit.

Welcher erste Schritt erhöht die Wahrscheinlichkeit, Unterstützung zu erhalten?`,
options:[
"Einen Business Case erstellen, der Risiken und Nutzen aufzeigt",
"Sofortige Durchführung umfangreicher Penetrationstests",
"Migration auf eine neue Plattform",
"Einführung zusätzlicher Berichtsvorlagen"
],
correct:0
}



];

let currentQuestion = 0;

let userAnswers =
    new Array(questions.length).fill(null);

function saveCurrentAnswer(){

    const selected =
        document.querySelector(
            'input[name="answer"]:checked'
        );

    if(selected){

        userAnswers[currentQuestion] =
            parseInt(selected.value);
    }
}

function loadQuestion(){

    const q = questions[currentQuestion];

    document.getElementById("counter").innerHTML =
        `Question ${currentQuestion+1} of ${questions.length}`;

    document.getElementById("question").innerText =
        q.question;

    let html = "";

    q.options.forEach((option,index)=>{

        const checked =
            userAnswers[currentQuestion] === index
            ? "checked"
            : "";

        html += `
        <label class="option">

            <input
                type="radio"
                name="answer"
                value="${index}"
                ${checked}>

            ${String.fromCharCode(65+index)}.
            ${option}

        </label>`;
    });

    document.getElementById("options").innerHTML =
        html;

    document.getElementById("answerBox").style.display =
        "none";
}

function nextQuestion(){

    saveCurrentAnswer();

    if(currentQuestion < questions.length-1){

        currentQuestion++;

        loadQuestion();
    }
}

function previousQuestion(){

    saveCurrentAnswer();

    if(currentQuestion > 0){

        currentQuestion--;

        loadQuestion();
    }
}

function showAnswer(){

    const q = questions[currentQuestion];

    const letter =
        String.fromCharCode(
            65 + q.correct
        );

    document.getElementById("answerBox")
        .style.display = "block";

    document.getElementById("answerBox")
        .innerHTML =
        "✅ Correct Answer: " + letter;
}

function saveSession(){

    localStorage.setItem(
        "currentQuestion",
        currentQuestion
    );

    localStorage.setItem(
        "userAnswers",
        JSON.stringify(userAnswers)
    );

    alert("Session saved");
}

function endExam(){

    saveCurrentAnswer();

    let correct = 0;

    let answered = 0;

    for(let i=0;i<questions.length;i++){

        if(userAnswers[i] !== null){

            answered++;

            if(
                userAnswers[i] ===
                questions[i].correct
            ){
                correct++;
            }
        }
    }

    const total =
        questions.length;

    const incorrect =
        answered - correct;

    const unanswered =
        total - answered;

    const percentage =
        (
            (correct / total)
            * 100
        ).toFixed(2);

    const passed =
        percentage >= 65;

    document.querySelector(".question-area")
        .style.display = "none";

    document.querySelector(".navigation")
        .style.display = "none";

    document.getElementById("resultScreen")
        .style.display = "block";

    document.getElementById("finalScore")
        .innerHTML =
        percentage + "%";

    document.getElementById("correctCount")
        .innerHTML =
        "✅ Correct: " + correct;

    document.getElementById("incorrectCount")
        .innerHTML =
        "❌ Incorrect: " + incorrect;

    document.getElementById("answeredCount")
        .innerHTML =
        "📝 Answered: " + answered;

    document.getElementById("unansweredCount")
        .innerHTML =
        "⚪ Unanswered: " + unanswered;

    document.getElementById("examStatus")
        .innerHTML =
        passed
        ? "✅ PASSED"
        : "❌ FAILED";
}

if(questions.length > 0){
    loadQuestion();
}

</script>

</body>
</html>
